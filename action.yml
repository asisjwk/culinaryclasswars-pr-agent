# action.yml
name: 'Culinary Class Wars PR Agent'
description: 'AI based Culinary Class Wars Concept PR Agent'
inputs:
  gemini_api_key:
    description: 'Gemini API Key'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Run Culinary Review
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        ACTION_PATH: ${{ github.action_path }}
      with:
        script: |
          node ${{ github.action_path }}/scripts/culinary_review.js
          const path = require('path');
          const scriptPath = path.join(process.env.ACTION_PATH, 'scripts/culinary_review.js');

          console.log(`[System] Executing script: ${scriptPath}`);

          const culinaryReview = require(scriptPath);
          await culinaryReview({ github, context });