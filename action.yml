# action.yml
name: 'Culinary Class Wars PR Agent'
description: 'AI based Culinary Class Wars Concept PR Agent'
inputs:
  gemini_api_key:
    description: 'Gemini API Key'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Run Culinary Review
      shell: bash
      uses: actions/github-script@v7
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        ACTION_PATH: ${{ github.action_path }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      with:
        script: |
          const path = require('path');
          const scriptPath = path.join(process.env.ACTION_PATH, 'scripts/culinary_review.js');

          const reviewer = require(scriptPath);

          await reviewer({ github, context });