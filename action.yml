# action.yml
name: 'Culinary Class Wars PR Agent'
description: 'AI based Culinary Class Wars Concept PR Agent'
inputs:
  gemini_api_key:
    description: 'Gemini API Key'
    required: true
  github_token:
    description: 'Github Token'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Culinary Review
      uses: actions/github-script@v7
      with:
        script: |
          const path = require('path');
          const scriptPath = path.join('${{ github.action_path }}', 'scripts/culinary_review.js');
          const reviewer = require(scriptPath);
          await reviewer({ github, context });